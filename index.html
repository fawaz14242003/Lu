<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>قلب فهدة</title>
    <style>
        /* إعدادات الشاشة والخلفية */
        body {
            background-color: black;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            background-color: black;
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas" width="800" height="800"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        // نقل نقطة الصفر (المركز) إلى منتصف الشاشة
        ctx.translate(400, 400);

        // معادلات رسم القلب
        function heartX(t) {
            return 16 * Math.pow(Math.sin(t), 3);
        }

        function heartY(t) {
            // نضرب في سالب لأن محور الصادات (Y) في المتصفح مقلوب
            return -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
        }

        // إعدادات الرسم
        ctx.strokeStyle = 'pink'; // لون الخط
        ctx.lineWidth = 0.5;      // سماكة الخط
        ctx.beginPath();
        ctx.moveTo(0, 0);

        // حلقة الرسم لإنشاء الخطوط المتداخلة
        for (let i = 0; i < 2500; i++) {
            let x = heartX(i) * 20;
            let y = heartY(i) * 20;
            ctx.lineTo(x, y);
        }
        ctx.stroke(); // تنفيذ الرسم

        // كتابة الاسم "فهدة" في المنتصف
        ctx.fillStyle = 'white';
        ctx.font = 'bold 40px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        // رفع النص قليلاً ليكون متمركزاً داخل القلب
        ctx.fillText('', 0, -20); 
    </script>

</body>
</html>
