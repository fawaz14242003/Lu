<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>نظام التهادي 🎁</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        body { background: #f8fafc; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; min-height: 100vh; }
        .card { background: white; border-radius: 2rem; padding: 2rem; width: 100%; max-width: 22rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .btn { background: linear-gradient(135deg, #10b981, #3b82f6); color: white; border-radius: 1rem; padding: 1rem; width: 100%; font-weight: 700; cursor: pointer; border: none; }
        .inp { width: 100%; border: 1px solid #e2e8f0; border-radius: 1rem; padding: 1rem; text-align: center; font-size: 1.2rem; margin-bottom: 1rem; outline: none; }
        .hide { display: none !important; }
        .spin { width: 20px; height: 20px; border: 2px solid #f3f3f3; border-top: 2px solid #10b981; border-radius: 50%; animation: s 1s linear infinite; margin: auto; }
        @keyframes s { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="s-login" class="card">
    <div class="text-center mb-6">
        <div class="text-5xl mb-3">🎁</div>
        <h1 class="text-xl font-black text-slate-800">نظام التهادي الرقمي</h1>
        <p class="text-[10px] text-slate-500 font-bold">أدخل رقمك (1-6)</p>
    </div>
    <input type="text" id="inp-code" class="inp" placeholder="الرمز السري">
    <button class="btn" onclick="login()" id="btn-login">دخول الآن ←</button>
</div>

<div id="s-admin" class="card hide text-center">
    <h2 class="font-black text-xl mb-6">لوحة التحكم ⚙️</h2>
    <p class="text-xs text-slate-500 mb-4">أهلاً فواز، اضغط الزر بالأسفل لتهيئة الأرقام إذا كان الموقع يعطي "غير مسجل".</p>
    <button class="btn mb-4" onclick="forceSetup()">🛠️ زر الإصلاح الشامل (Run SQL)</button>
    <button class="btn" onclick="runDraw()">🎲 بدء القرعة</button>
    <button onclick="location.reload()" class="text-xs mt-6 block w-full">خروج</button>
</div>

<div id="s-member" class="card hide text-center">
    <h2 id="el-welcome" class="text-lg font-bold mb-4"></h2>
    <div id="zone-result" class="hide">
        <div class="bg-slate-50 p-4 rounded-2xl mb-4">
            <p class="text-[10px] font-bold text-slate-400 mb-2">أنت ستقوم بإهداء الرقم</p>
            <div id="el-target" class="text-5xl font-black text-emerald-600"></div>
        </div>
        <button class="btn">📦 تأكيد التسليم</button>
    </div>
    <div id="zone-nodraw" class="py-10 text-slate-400 font-bold">القرعة لم تبدأ بعد ⏳</div>
    <button onclick="location.reload()" class="text-xs mt-6">خروج</button>
</div>

<script>
const SURL = 'https://zfulsalproplkmdndjfa.supabase.co';
const SKEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpmdWxzYWxwcm9wbGttZG5kamZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MTQ3NDEsImV4cCI6MjA5MTM5MDc0MX0.2B7cGamM0ZWS5g8dKK8gVteolLJzmkQk7UEZncqfIVc';
const db = supabase.createClient(SURL, SKEY);

async function login() {
    let code = document.getElementById("inp-code").value.trim().toLowerCase(); // يحول أي حرف كبير لصغير تلقائياً
    if(!code) return;

    // 🔥 ميزة الدخول الإجباري للمشرف
    if (code === 'admin2026') {
        document.getElementById("s-login").classList.add("hide");
        document.getElementById("s-admin").classList.remove("hide");
        return;
    }

    const { data: u } = await db.from('users').select('*').eq('code', code).maybeSingle();
    if(!u) {
        alert("الرقم غير مسجل! أدخل كمدير (admin2026) واضغط زر الإصلاح.");
        return;
    }

    document.getElementById("s-login").classList.add("hide");
    document.getElementById("s-member").classList.remove("hide");
    document.getElementById("el-welcome").innerText = "مرحباً رقم " + u.name;
    loadResults(u.id);
}

async function forceSetup() {
    // هذا الزر يغنيك عن الذهاب لـ Supabase
    const users = [{name:'المشرف', code:'admin2026', role:'admin'}];
    for(let i=1; i<=6; i++) users.push({name:i.toString(), code:i.toString(), role:'member'});
    
    const { error } = await db.from('users').upsert(users);
    if(error) alert("خطأ: " + error.message);
    else alert("تمت التهيئة بنجاح! جرب الدخول الآن بالأرقام 1-6");
}

async function runDraw() {
    const { data: users } = await db.from('users').select('*').eq('role', 'member');
    const { data: d } = await db.from('draws').insert({month_name:'سحب'}).select().single();
    let sh = [...users].sort(() => Math.random() - 0.5);
    let final = sh.map((u, i) => ({ draw_id: d.id, giver_id: sh[i].id, receiver_id: sh[(i + 1) % sh.length].id }));
    await db.from('assignments').insert(final);
    alert("تمت القرعة!");
}

async function loadResults(uid) {
    const { data: draw } = await db.from('draws').select('*').order('created_at', {ascending: false}).limit(1).maybeSingle();
    if(!draw) return;
    const { data: asgn } = await db.from('assignments').select('*, receiver:users!receiver_id(*)').eq('giver_id', uid).eq('draw_id', draw.id).maybeSingle();
    if(asgn) {
        document.getElementById("zone-nodraw").classList.add("hide");
        document.getElementById("zone-result").classList.remove("hide");
        document.getElementById("el-target").innerText = asgn.receiver.name;
    }
}
</script>
</body>
</html>
