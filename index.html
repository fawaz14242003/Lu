<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🎁 نظام التهادي العائلي</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { font-family: 'Segoe UI', Tahoma, sans-serif; }
  .fade-in { animation: fadeIn .4s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
  .card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 30px rgba(0,150,80,.08); }
</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-green-50 via-white to-emerald-50">

<!-- ==================== LOGIN ==================== -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
  <div class="card p-10 w-full max-w-sm fade-in">
    <div class="text-center mb-8">
      <div class="text-6xl mb-3">🎁</div>
      <h1 class="text-2xl font-bold text-green-800">نظام التهادي العائلي</h1>
      <p class="text-gray-400 text-sm mt-1">أدخل رمز الدخول الخاص بك</p>
    </div>
    <input id="codeInput" type="text" placeholder="رمز الدخول..."
      class="w-full border-2 border-green-100 rounded-xl px-4 py-3 text-center text-xl
             focus:outline-none focus:border-green-400 transition mb-4"/>
    <button onclick="login()"
      class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition">
      دخول 🚀
    </button>
    <p id="loginError" class="text-red-500 text-center mt-3 hidden"></p>
  </div>
</div>

<!-- ==================== ADMIN ==================== -->
<div id="adminScreen" class="hidden min-h-screen p-4 max-w-2xl mx-auto fade-in">
  <div class="card p-6 mt-6">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-xl font-bold text-green-800">🛡️ لوحة المشرف</h2>
      <button onclick="logout()" class="text-gray-400 hover:text-red-500 text-sm">خروج</button>
    </div>

    <div class="bg-green-50 rounded-xl p-5 mb-5">
      <h3 class="font-bold text-green-700 mb-2">🎲 إجراء القرعة</h3>
      <p class="text-sm text-gray-500 mb-4">خوارزمية Safe Shift تضمن عدم إهداء أي شخص لنفسه</p>
      <button onclick="runDraw()"
        class="bg-green-600 hover:bg-green-700 text-white font-bold px-6 py-2 rounded-lg transition">
        ابدأ القرعة الجديدة 🎉
      </button>
      <p id="drawMsg" class="mt-3 text-sm font-medium"></p>
    </div>

    <div id="assignmentsAdmin" class="hidden">
      <h3 class="font-bold text-green-700 mb-3">📋 نتائج القرعة الحالية</h3>
      <div id="assignTable" class="space-y-2"></div>
    </div>
  </div>
</div>

<!-- ==================== USER ==================== -->
<div id="userScreen" class="hidden min-h-screen p-4 max-w-md mx-auto fade-in">
  <div class="card p-6 mt-6">
    <div class="flex justify-between items-center mb-6">
      <h2 id="userName" class="text-xl font-bold text-green-800"></h2>
      <button onclick="logout()" class="text-gray-400 hover:text-red-500 text-sm">خروج</button>
    </div>

    <div id="assignmentBox" class="bg-green-50 rounded-xl p-5 mb-5 text-center hidden">
      <p class="text-gray-500 mb-1">ستهدي هذه المرة</p>
      <div id="receiverDisplay" class="text-4xl font-black text-green-700 my-3"></div>
      <button id="confirmBtn" onclick="confirmDelivery()"
        class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold px-6 py-2 rounded-lg transition mt-2">
        ✅ تأكيد التسليم
      </button>
      <p id="confirmedBadge" class="hidden mt-3 text-green-600 font-bold">✔️ تم التسليم!</p>
    </div>

    <div id="noAssignment" class="hidden text-center text-gray-400 py-8">
      ⏳ لم تُجرَ القرعة بعد، انتظر المشرف.
    </div>

    <div class="bg-amber-50 rounded-xl p-5">
      <h3 class="font-bold text-amber-700 mb-3">💡 استشارة هدايا ذكية</h3>
      <div class="flex gap-2 mb-3">
        <select id="suggGender" class="flex-1 border rounded-lg px-3 py-2 text-sm">
          <option value="male">ذكر</option>
          <option value="female">أنثى</option>
        </select>
        <input id="suggAge" type="number" placeholder="العمر" value="25"
          class="w-24 border rounded-lg px-3 py-2 text-sm"/>
        <button onclick="getSuggestions()"
          class="bg-amber-500 hover:bg-amber-600 text-white px-3 py-2 rounded-lg text-sm font-bold">
          اقترح
        </button>
      </div>
      <ul id="suggList" class="space-y-1 text-sm text-gray-600"></ul>
    </div>
  </div>
</div>

<script>
// ===================== SUPABASE INIT =====================
const SUPA_URL = 'https://zfulsalproplkmdndjfa.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpmdWxzYWxwcm9wbGttZG5kamZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MTQ3NDEsImV4cCI6MjA5MTM5MDc0MX0.2B7cGamM0ZWS5g8dKK8gVteolLJzmkQk7UEZncqfIVc';
const { createClient } = supabase;
const db = createClient(SUPA_URL, SUPA_KEY);

let currentUser = null;
let currentAssignment = null;

// ===================== LOGIN =====================
async function login() {
  const raw = document.getElementById('codeInput').value.trim();
  if (!raw) return;

  const { data, error } = await db
    .from('users')
    .select('*')
    .ilike('code', raw)
    .single();

  if (error || !data) {
    showError('❌ الرمز غير صحيح، تحقق وأعد المحاولة');
    return;
  }

  currentUser = data;
  document.getElementById('loginScreen').classList.add('hidden');

  if (data.role === 'admin') {
    showAdmin();
  } else {
    showUser();
  }
}

document.getElementById('codeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

function showError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 3000);
}

function logout() {
  currentUser = null;
  currentAssignment = null;
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('adminScreen').classList.add('hidden');
  document.getElementById('userScreen').classList.add('hidden');
  document.getElementById('codeInput').value = '';
}

// ===================== ADMIN =====================
async function showAdmin() {
  document.getElementById('adminScreen').classList.remove('hidden');
  await loadAdminAssignments();
}

async function runDraw() {
  const msg = document.getElementById('drawMsg');
  msg.textContent = '⏳ جاري إجراء القرعة...';
  msg.className = 'mt-3 text-sm font-medium text-gray-500';

  const { data: users } = await db
    .from('users')
    .select('id, name')
    .neq('role', 'admin');

  if (!users || users.length < 2) {
    msg.textContent = '❌ يلزم وجود مستخدمان على الأقل';
    msg.className = 'mt-3 text-sm font-medium text-red-500';
    return;
  }

  const shuffled = shuffle([...users]);
  const n = shuffled.length;

  const { data: draw } = await db
    .from('draws')
    .insert({ status: 'active' })
    .select()
    .single();

  const assignments = shuffled.map((user, i) => ({
    draw_id: draw.id,
    giver_id: user.id,
    receiver_id: shuffled[(i + 1) % n].id,
    confirmed: false
  }));

  await db.from('assignments').insert(assignments);

  msg.textContent = '✅ تمت القرعة بنجاح!';
  msg.className = 'mt-3 text-sm font-medium text-green-600';
  await loadAdminAssignments();
}

async function loadAdminAssignments() {
  const { data: draws } = await db
    .from('draws')
    .select('id')
    .order('created_at', { ascending: false })
    .limit(1);

  if (!draws || draws.length === 0) return;

  const drawId = draws[0].id;
  const { data: asgn } = await db
    .from('assignments')
    .select('giver_id, receiver_id, confirmed')
    .eq('draw_id', drawId);

  if (!asgn) return;

  const { data: users } = await db.from('users').select('id, name');
  const userMap = {};
  users.forEach(u => userMap[u.id] = u.name);

  const container = document.getElementById('assignTable');
  container.innerHTML = '';
  asgn.forEach(a => {
    const div = document.createElement('div');
    div.className = 'flex justify-between items-center bg-gray-50 px-4 py-2 rounded-lg text-sm';
    div.innerHTML = `
      <span class="font-medium">${userMap[a.giver_id] || '؟'}</span>
      <span class="text-green-500 font-bold">← يهدي ←</span>
      <span class="font-medium">${userMap[a.receiver_id] || '؟'}</span>
      <span class="${a.confirmed ? 'text-green-500' : 'text-gray-300'}">${a.confirmed ? '✔️' : '○'}</span>
    `;
    container.appendChild(div);
  });

  document.getElementById('assignmentsAdmin').classList.remove('hidden');
}

// ===================== USER =====================
async function showUser() {
  document.getElementById('userScreen').classList.remove('hidden');
  document.getElementById('userName').textContent = `👋 مرحباً ${currentUser.name}`;

  const { data: draws } = await db
    .from('draws')
    .select('id')
    .order('created_at', { ascending: false })
    .limit(1);

  if (!draws || draws.length === 0) {
    document.getElementById('noAssignment').classList.remove('hidden');
    return;
  }

  const drawId = draws[0].id;
  const { data: asgn } = await db
    .from('assignments')
    .select('id, receiver_id, confirmed')
    .eq('draw_id', drawId)
    .eq('giver_id', currentUser.id)
    .single();

  if (!asgn) {
    document.getElementById('noAssignment').classList.remove('hidden');
    return;
  }

  currentAssignment = asgn;

  const { data: receiver } = await db
    .from('users')
    .select('name, gender, age')
    .eq('id', asgn.receiver_id)
    .single();

  document.getElementById('assignmentBox').classList.remove('hidden');
  document.getElementById('receiverDisplay').textContent = receiver?.name || '؟';

  if (receiver) {
    document.getElementById('suggGender').value = receiver.gender || 'male';
    document.getElementById('suggAge').value = receiver.age || 25;
  }

  if (asgn.confirmed) {
    document.getElementById('confirmBtn').classList.add('hidden');
    document.getElementById('confirmedBadge').classList.remove('hidden');
  }
}

async function confirmDelivery() {
  if (!currentAssignment) return;
  await db
    .from('assignments')
    .update({ confirmed: true })
    .eq('id', currentAssignment.id);

  document.getElementById('confirmBtn').classList.add('hidden');
  document.getElementById('confirmedBadge').classList.remove('hidden');
}

// ===================== GIFT SUGGESTIONS =====================
const giftDB = {
  male: {
    young:  ['⌚ ساعة أنيقة', '🎮 بطاقة ألعاب رقمية', '👟 حذاء رياضي', '📚 كتاب تطوير ذات', '🎧 سماعات لاسلكية'],
    mid:    ['👔 قميص رسمي فاخر', '🖊️ قلم فاخر', '💼 حقيبة عمل جلدية', '☕ ماكينة قهوة', '📖 كتاب أعمال ناجحة'],
    senior: ['🌿 طقم عطور عود', '📿 سبحة فاخرة', '🍵 طقم شاي وقهوة', '🎋 نباتات منزلية', '🩴 شبشب جلد ناعم']
  },
  female: {
    young:  ['💄 طقم مكياج', '👜 حقيبة يد صغيرة', '💍 إكسسوار عصري', '🌸 عطر خفيف', '🎀 قلادة ذهبية اللون'],
    mid:    ['🧴 سيت عناية بالبشرة', '👒 وشاح فاخر', '🌺 باقة عطور مميزة', '🕯️ شمعة لافندر', '💅 طقم مناكير راقي'],
    senior: ['🌹 عطر عود نسائي', '🧣 شال ناعم', '📿 مسبحة كريستال', '🍫 شوكولاتة فاخرة', '🌿 زيوت عطرية طبيعية']
  }
};

function getSuggestions() {
  const gender = document.getElementById('suggGender').value;
  const age = parseInt(document.getElementById('suggAge').value) || 25;
  const tier = age < 20 ? 'young' : age < 45 ? 'mid' : 'senior';
  const list = giftDB[gender]?.[tier] || giftDB['male']['mid'];

  const ul = document.getElementById('suggList');
  ul.innerHTML = '';
  list.forEach(g => {
    const li = document.createElement('li');
    li.className = 'bg-amber-100 rounded-lg px-3 py-2';
    li.textContent = g;
    ul.appendChild(li);
  });
}

// ===================== UTILS =====================
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
</script>
</body>
</html>
