<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة الدخول - الهدايا</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* إعدادات الصفحة الأساسية والخلفية */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(180deg, #fcd3e1 0%, #f4a1c1 100%);
            overflow: hidden; /* لمنع ظهور أشرطة التمرير بسبب الأشكال الجانبية */
            position: relative;
        }

        /* زينة الخلفية (خفيفة جداً على المعالج ولا تسبب تعليق) */
        .decoration {
            position: absolute;
            font-size: 30px;
            opacity: 0.8;
            z-index: 1;
            user-select: none;
        }
        .d1 { top: 10%; left: 20%; transform: rotate(-15deg); }
        .d2 { top: 15%; right: 25%; font-size: 40px; }
        .d3 { top: 25%; left: 40%; font-size: 25px; }
        .d4 { bottom: 15%; right: 15%; transform: rotate(20deg); font-size: 35px; }
        .d5 { bottom: 20%; left: 10%; transform: rotate(-10deg); }
        .d6 { top: 40%; right: 10%; font-size: 20px; }

        /* الصندوق الأبيض الرئيسي */
        .welcome-card {
            background-color: #ffffff;
            border-radius: 25px;
            padding: 40px 25px;
            width: 85%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            position: relative;
            z-index: 10; /* لإبقاء الصندوق فوق زينة الخلفية */
        }

        /* تنسيق النصوص */
        .hadith-text {
            font-size: 16px;
            font-weight: 700;
            color: #222;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .description-text {
            font-size: 15px;
            color: #555;
            line-height: 1.7;
            margin-bottom: 30px;
        }

        .description-text strong {
            color: #222;
            display: block;
            margin-top: 5px;
        }

        /* تنسيق مربع الإدخال */
        .input-field {
            width: 100%;
            box-sizing: border-box;
            padding: 15px;
            border: 1px solid #eab8ce;
            border-radius: 12px;
            text-align: center;
            font-size: 15px;
            font-family: inherit;
            margin-bottom: 25px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-field:focus {
            border-color: #d86b9f;
        }

        .input-field::placeholder {
            color: #b0b0b0;
        }

        /* تنسيق زر الدخول */
        .enter-button {
            background-color: #e571a8;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 12px 50px;
            font-size: 18px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }

        .enter-button:hover {
            background-color: #d46096;
        }

        .enter-button:active {
            transform: scale(0.95); /* تأثير ضغطة الزر */
        }
    </style>
</head>
<body>

    <div class="decoration d1">🎉</div>
    <div class="decoration d2">🎊</div>
    <div class="decoration d3">💖</div>
    <div class="decoration d4">🎈</div>
    <div class="decoration d5">🎉</div>
    <div class="decoration d6">✨</div>

    <div class="welcome-card">
        <p class="hadith-text">كما أوصانا النبي ﷺ (تهادوا تحابوا)</p>
        
        <p class="description-text">
            ولتجديد ذكرى الفعالية ولإشباع فضولك حيال من ستهدي
            <strong>ضع سنة ميلادك بالهجري</strong>
        </p>
        
        <input type="text" class="input-field" placeholder="مثال: ١٤٢٠">
        
        <button class="enter-button">دخول</button>
    </div>

</body>
</html>
