<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* إعدادات الخلفية المطابقة للصورة */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Tajawal', sans-serif;
            /* تدرج لوني وردي مطابق للصورة */
            background: linear-gradient(180deg, #fad1e1 0%, #f49bbb 100%);
            overflow: hidden; 
            position: relative;
        }

        /* زينة الخلفية (بدون جافاسكريبت لمنع التعليق) */
        .bg-icon {
            position: absolute;
            font-size: 28px;
            user-select: none;
            opacity: 0.9;
            /* حركة طفو خفيفة وناعمة */
            animation: float 4s ease-in-out infinite;
        }

        /* توزيع الأشكال كما في الصورة تقريباً */
        .icon-1 { top: 12%; right: 15%; font-size: 35px; animation-delay: 0s; }
        .icon-2 { top: 18%; right: 40%; font-size: 30px; animation-delay: 1s; }
        .icon-3 { top: 15%; left: 35%; font-size: 28px; animation-delay: 0.5s; }
        .icon-4 { top: 25%; left: 10%; font-size: 32px; animation-delay: 1.5s; }
        .icon-5 { bottom: 25%; right: 15%; font-size: 30px; animation-delay: 0.2s; }
        .icon-6 { bottom: 15%; right: 30%; font-size: 25px; animation-delay: 1.2s; }
        .icon-7 { bottom: 20%; left: 10%; font-size: 35px; animation-delay: 0.8s; } /* بالون أحمر */
        .icon-8 { bottom: 5%; left: 20%; font-size: 30px; animation-delay: 1.8s; }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* الصندوق الأبيض بالمنتصف */
        .modal-card {
            background-color: #ffffff;
            border-radius: 25px;
            padding: 40px 20px;
            width: 88%;
            max-width: 360px;
            text-align: center;
            /* ظل ناعم يعطي عمق وجمالية للصندوق */
            box-shadow: 0 15px 35px rgba(212, 96, 150, 0.2);
            z-index: 10;
        }

        /* تنسيق النصوص داخل الصندوق */
        .hadith-text {
            font-size: 17px;
            font-weight: 700;
            color: #222;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .description-text {
            font-size: 15px;
            color: #333;
            line-height: 1.8;
            margin-bottom: 30px;
            font-weight: 500;
        }

        /* حقل إدخال سنة الميلاد */
        .year-input {
            width: 85%;
            padding: 15px;
            border: 1px solid #f3c2d6;
            border-radius: 12px;
            text-align: center;
            font-size: 15px;
            font-family: inherit;
            margin-bottom: 25px;
            outline: none;
            background-color: #fff;
            transition: all 0.3s ease;
        }

        .year-input:focus {
            border-color: #e571a8;
            box-shadow: 0 0 8px rgba(229, 113, 168, 0.3);
        }

        .year-input::placeholder {
            color: #c4c4c4;
        }

        /* زر الدخول */
        .login-btn {
            background-color: #e871ab; /* لون مطابق للصورة */
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 12px 55px;
            font-size: 18px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(232, 113, 171, 0.3);
            transition: all 0.2s ease;
        }

        .login-btn:hover {
            background-color: #d85c98;
            transform: translateY(-2px);
        }

        .login-btn:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div class="bg-icon icon-1">💖</div>
    <div class="bg-icon icon-2">🎊</div>
    <div class="bg-icon icon-3">🎊</div>
    <div class="bg-icon icon-4">💖</div>
    <div class="bg-icon icon-5">🎉</div>
    <div class="bg-icon icon-6">🎊</div>
    <div class="bg-icon icon-7">🎈</div>
    <div class="bg-icon icon-8">🎉</div>

    <div class="modal-card">
        <p class="hadith-text">كما أوصانا النبي ﷺ (تهادوا تحابوا)</p>
        
        <p class="description-text">
            ولتجديد ذكرى الفعالية ولإشباع فضولك حيال من ستهدي
            <strong>ضع سنة ميلادك بالهجري</strong>
        </p>
        
        <input type="text" class="year-input" placeholder="ادخل سنة الميلاد">
        
        <button class="login-btn">دخول</button>
    </div>

</body>
</html>
