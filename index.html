<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة الهدايا - لولو</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* الإعدادات الأساسية */
        body {
            margin: 0;
            padding: 0;
            background-color: #fdf5f8; /* لون خلفية وردي فاتح جداً */
            font-family: 'Tajawal', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* حاوية التطبيق (شكل الجوال) */
        .app-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }

        /* العناوين العلوية */
        .header-title {
            text-align: center;
            color: #d46096;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .header-subtitle {
            text-align: center;
            color: #333;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        /* صندوق اسم المهدى إليه */
        .target-name-box {
            background-color: #f8cddf;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .target-name-box h1 {
            color: #d42a77;
            margin: 0;
            font-size: 32px;
            font-weight: 700;
        }

        /* صندوق أمنيات المهدى إليه */
        .wishlist-box {
            background-color: #ffffff;
            border: 2px dashed #f1a9c8;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .wishlist-box h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #111;
        }
        .wishlist-box p {
            margin: 0;
            color: #888;
            font-size: 14px;
        }

        /* قسم اختيار الهدايا */
        .selection-section {
            background-color: #fcecf2;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }
        .selection-section h3 {
            margin: 0 0 20px 0;
            font-size: 16px;
            color: #111;
        }

        /* شبكة أزرار الهدايا */
        .gifts-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .gift-item {
            background-color: #fbdbec;
            border: 2px solid transparent;
            border-radius: 15px;
            width: calc(33% - 15px);
            min-width: 80px;
            padding: 15px 5px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .gift-item:hover {
            transform: translateY(-3px);
        }
        /* كلاس التحديد (الذي يظهر عند الضغط على الهدية) */
        .gift-item.selected {
            border-color: #d42a77;
            background-color: #f8cddf;
        }
        
        .gift-icon {
            font-size: 28px;
            margin-bottom: 5px;
        }
        .gift-name {
            font-size: 12px;
            font-weight: 700;
            color: #333;
        }

        /* ملاحظة ومربع الكتابة */
        .hint-text {
            color: #d46096;
            font-size: 12px;
            margin-bottom: 15px;
        }
        .custom-gift-input {
            width: 100%;
            box-sizing: border-box;
            border: none;
            border-radius: 15px;
            padding: 15px;
            font-family: inherit;
            font-size: 14px;
            resize: none;
            height: 100px;
            outline: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }
        .custom-gift-input::placeholder {
            color: #ccc;
        }

        /* --- تأثيرات المربعات المتساقطة (خفيفة جداً ولا تسبب تعليق) --- */
        .confetti {
            position: fixed;
            top: -10px;
            width: 10px;
            height: 10px;
            background-color: #f00;
            opacity: 0.7;
            animation: fall linear forwards;
            z-index: 1;
        }
        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div id="confetti-container"></div>

    <div class="app-container">
        <div class="header-title">لولو</div>
        <div class="header-subtitle">انت ستهدي</div>

        <div class="target-name-box">
            <h1>فارس</h1>
        </div>

        <div class="wishlist-box">
            <h3>أمنيات فارس للهدايا: 🎁</h3>
            <p>(لم يكتب أمنياته بعد)</p>
        </div>

        <div class="selection-section">
            <h3>أكتب الهدايا التي ترغب بها: 💌</h3>
            
            <div class="gifts-grid">
                <div class="gift-item" onclick="toggleSelection(this)">
                    <span class="gift-icon">💄</span>
                    <span class="gift-name">ميكب</span>
                </div>
                <div class="gift-item selected" onclick="toggleSelection(this)">
                    <span class="gift-icon">💰</span>
                    <span class="gift-name">روبلوكس</span>
                </div>
                <div class="gift-item" onclick="toggleSelection(this)">
                    <span class="gift-icon">🎧</span>
                    <span class="gift-name">سماعه طبيه</span>
                </div>
                <div class="gift-item" onclick="toggleSelection(this)">
                    <span class="gift-icon">❤️‍🔥</span>
                    <span class="gift-name">عطور</span>
                </div>
                <div class="gift-item" onclick="toggleSelection(this)">
                    <span class="gift-icon">🧰</span>
                    <span class="gift-name">بسطار</span>
                </div>
            </div>

            <div class="hint-text">(اضغط على المربعات أو اكتب هديتك بنفسك)</div>
            
            <textarea class="custom-gift-input" placeholder="اكتب هنا..."></textarea>
        </div>
    </div>

    <script>
        // 1. وظيفة تحديد/إلغاء تحديد الهدايا
        function toggleSelection(element) {
            element.classList.toggle('selected');
        }

        // 2. نظام المربعات المتساقطة (مُحسن وخفيف جداً)
        function createConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#3498db', '#e74c3c', '#9b59b6', '#2ecc71', '#f1c40f', '#e67e22'];
            
            // إنشاء 30 مربع فقط (عدد قليل لا يسبب تعليق)
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.classList.add('confetti');
                    
                    // خصائص عشوائية للمربع
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDuration = (Math.random() * 3 + 2) + 's'; // سرعة السقوط بين 2 لـ 5 ثواني
                    
                    container.appendChild(confetti);

                    // حذف المربع بعد انتهاء سقوطه لتنظيف الذاكرة ومنع التعليق
                    setTimeout(() => {
                        confetti.remove();
                    }, 5000); 

                }, i * 150); // تأخير بسيط بين ظهور كل مربع والآخر
            }
        }

        // تشغيل تأثير المربعات عند فتح الصفحة
        window.onload = createConfetti;
    </script>
</body>
</html>
