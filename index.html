<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>نظام التهادي الذكي 🎁</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        :root { --bg: #f8fafc; --accent: #10b981; --text: #1e293b; }
        html, body { height: 100%; margin: 0; background: var(--bg); color: var(--text); }
        body { display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
        .card { background: white; border: 1px solid #e2e8f0; border-radius: 2rem; padding: 2rem; width: 100%; max-width: 22rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .btn { background: linear-gradient(135deg, #10b981, #3b82f6); color: white; border-radius: 1rem; padding: 1rem; width: 100%; font-weight: 700; cursor: pointer; border: none; }
        .inp { width: 100%; border: 1px solid #e2e8f0; border-radius: 1rem; padding: 1rem; text-align: center; font-size: 1.2rem; margin-bottom: 1rem; outline: none; }
        .hide { display: none !important; }
        .inner { background: #f1f5f9; padding: 1rem; border-radius: 1rem; margin-bottom: 1rem; }
        .spin { width: 20px; height: 20px; border: 2px solid #f3f3f3; border-top: 2px solid #10b981; border-radius: 50%; animation: s 1s linear infinite; margin: auto; }
        @keyframes s { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="s-login" class="card">
    <div class="text-center mb-6">
        <div class="text-5xl mb-2">🎁</div>
        <h1 class="text-xl font-black">نظام التهادي الرقمي</h1>
        <p class="text-xs text-slate-500">أدخل رقمك الخاص للمشاركة</p>
    </div>
    <input type="text" id="inp-code" class="inp" placeholder="أدخل رقمك (1-6)">
    <button class="btn" onclick="login()" id="btn-login">دخول ←</button>
</div>

<div id="s-member" class="card hide text-center">
    <h2 id="el-welcome" class="text-lg font-bold mb-4"></h2>
    <div id="zone-result" class="hide">
        <div class="inner">
            <p class="text-[10px] uppercase font-bold text-slate-400 mb-2">أنت ستقوم بإهداء الرقم</p>
            <div id="el-target" class="text-5xl font-black text-emerald-600 mb-4"></div>
            <button onclick="askAI()" class="text-xs font-bold text-emerald-700 bg-emerald-50 px-4 py-2 rounded-full mb-3">استشاره ذكيه ✨</button>
            <div id="ai-text" class="text-[10px] leading-relaxed text-right"></div>
        </div>
        <button onclick="markDelivered()" id="btn-del" class="btn">📦 تأكيد تسليم الهدية</button>
        <div id="msg-ok" class="hide font-bold text-green-600">✅ تم التسليم!</div>
    </div>
    <div id="zone-nodraw" class="py-10 text-slate-400">القرعة لم تبدأ بعد ⏳</div>
    <button onclick="logout()" class="text-xs text-slate-400 mt-6">خروج</button>
</div>

<div id="s-admin" class="card hide text-center">
    <h2 class="font-black mb-6">لوحة التحكم</h2>
    <div class="inner text-right text-xs">
        <p class="font-bold mb-2">⚙️ إعدادات النظام:</p>
        <p>• عدد المستخدمين: 6</p>
        <p>• الدخول: بالأرقام فقط</p>
    </div>
    <button class="btn mb-4" onclick="setupSystem()">🛠️ تهيئة الأرقام (1-6)</button>
    <button class="btn" onclick="runDraw()" id="btn-draw">🎲 إجراء القرعة الآن</button>
    <button onclick="logout()" class="text-xs text-slate-400 mt-6">خروج</button>
</div>

<script>
const SURL = 'https://psqogxndgghuozidreid.supabase.co';
const SKEY = 'sb_publishable_9whhd1B80pFNABoLinRtOA_pfcwij4G';
const db = supabase.createClient(SURL, SKEY);

async function login() {
    const code = document.getElementById("inp-code").value.trim();
    if(!code) return;
    const { data: u } = await db.from('users').select('*').eq('code', code).single();
    if(!u) { alert("الرقم غير مسجل!"); return; }
    
    document.getElementById("s-login").classList.add("hide");
    if(u.role === 'admin') {
        document.getElementById("s-admin").classList.remove("hide");
    } else {
        document.getElementById("s-member").classList.remove("hide");
        document.getElementById("el-welcome").innerText = "مرحباً يا مستخدم رقم (" + u.name + ")";
        loadResults(u.id);
    }
}

async function loadResults(uid) {
    const { data: draw } = await db.from('draws').select('*').order('created_at', {ascending: false}).limit(1).maybeSingle();
    if(!draw) return;
    const { data: asgn } = await db.from('assignments').select('*, receiver:users!receiver_id(*)').eq('giver_id', uid).eq('draw_id', draw.id).maybeSingle();
    if(asgn) {
        document.getElementById("zone-nodraw").classList.add("hide");
        document.getElementById("zone-result").classList.remove("hide");
        document.getElementById("el-target").innerText = asgn.receiver.name;
        if(asgn.is_delivered) { document.getElementById("btn-del").classList.add("hide"); document.getElementById("msg-ok").classList.remove("hide"); }
    }
}

// دالة لتهيئة الأرقام من 1 إلى 6 في قاعدة البيانات الجديدة
async function setupSystem() {
    if(!confirm("سيتم مسح البيانات القديمة وتهيئة الأرقام من 1 إلى 6. هل أنت متأكد؟")) return;
    
    // 1. مسح القديم
    await db.from('users').delete().neq('role', 'admin');
    
    // 2. إضافة الأرقام
    const users = [];
    for(let i=1; i<=6; i++) {
        users.push({ name: i.toString(), code: i.toString(), role: 'member', gender: 'ذكر' });
    }
    await db.from('users').insert(users);
    alert("تم تهيئة 6 مستخدمين بنجاح! 🚀");
}

async function runDraw() {
    if(!confirm("إجراء قرعة جديدة؟")) return;
    const { data: users } = await db.from('users').select('*').eq('role', 'member');
    const { data: d } = await db.from('draws').insert({ month_name: 'سحب جديد' }).select().single();
    let sh = [...users].sort(() => Math.random() - 0.5);
    let final = sh.map((u, i) => ({ draw_id: d.id, giver_id: sh[i].id, receiver_id: sh[(i + 1) % sh.length].id }));
    await db.from('assignments').insert(final);
    alert("تمت القرعة بنجاح! 🎉");
}

function askAI() {
    document.getElementById("ai-text").innerText = "بما أن المستخدمين أرقام، نقترح هدية محايدة مثل: شاحن متنقل، سماعة، أو بطاقة إهداء.";
}

function logout() { location.reload(); }
function markDelivered() { alert("تم التأكيد!"); location.reload(); }
</script>
</body>
</html>
